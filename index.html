<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Rewards | Premium Survey Portal</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- CryptoJS for Secure Signed URLs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #f43f5e;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.15) 0%, transparent 40%);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { width: 100%; max-width: 450px; padding: 20px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 2.8rem; color: var(--primary); margin-bottom: 10px; }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
        input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 14px; color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--primary); }

        .security-box { background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px dashed rgba(255, 255, 255, 0.1); }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 15px; font-size: 0.85rem; }
        .checkbox-group a { color: var(--primary); text-decoration: none; }
        .captcha-container { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .captcha-container input { width: 80px; text-align: center; padding: 8px; }

        .btn-primary { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 12px; padding: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        /* Dashboard Styles */
        .dashboard { display: none; }
        .status-banner { background: rgba(34, 197, 94, 0.1); color: #4ade80; padding: 8px; border-radius: 8px; font-size: 0.75rem; text-align: center; margin-bottom: 20px; }
        .user-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .earnings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .earning-card { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; text-align: center; }
        .earning-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 3px; }
        .earning-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .btn-go { width: 100%; background: var(--accent); padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; margin-bottom: 12px; }
        .btn-secondary { width: 100%; background: rgba(255, 255, 255, 0.1); padding: 10px; border: none; border-radius: 10px; color: white; font-size: 0.85rem; cursor: pointer; }

        #loading-overlay { position: fixed; inset: 0; background: var(--bg-dark); display: none; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer { text-align: center; margin-top: 25px; color: var(--text-dim); font-size: 0.75rem; }
        .legal-links { margin-top: 8px; }
        .legal-links a { color: var(--text-dim); text-decoration: none; margin: 0 5px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Loading...</p>
    </div>

    <div class="container">
        <!-- 🔐 LOGIN -->
        <div id="login-view" class="card">
            <div class="header">
                <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
                <h1>NexGen Rewards</h1>
                <p class="subtitle">Secure Worker Portal</p>
            </div>

            <div class="input-group">
                <label>Authorized ID</label>
                <input type="text" id="workerId" placeholder="Enter NEX-ID">
            </div>

            <div class="security-box">
                <div class="checkbox-group">
                    <input type="checkbox" id="termsConsent">
                    <label for="termsConsent">I agree to the <a href="#">Terms</a> & <a href="#">Privacy</a>.</label>
                </div>
                <div class="captcha-container">
                    <label>Human Check: <b>7 + 2 = ?</b></label>
                    <input type="number" id="captchaValue" placeholder="Solve">
                </div>
            </div>

            <button class="btn-primary" onclick="login()">Verify Access</button>

            <div class="footer">
                <div class="legal-links">
                    <a href="#">Privacy Policy</a> • <a href="#">Terms of Service</a>
                </div>
            </div>
        </div>

        <!-- 🚀 DASHBOARD -->
        <div id="dashboard-view" class="card dashboard">
            <div class="status-banner">Session Secured via HMAC-SHA1</div>
            <div class="user-header">
                <div class="avatar"><i class="fas fa-user-tie"></i></div>
                <div class="user-info">
                    <h2 id="display-id">NEX01</h2>
                    <p>Authorized Worker</p>
                </div>
            </div>
            <div class="earnings-grid">
                <div class="earning-card">
                    <div class="earning-label">Earnings</div>
                    <div class="earning-value" id="pending-amt">$0.00</div>
                </div>
                <div class="earning-card">
                    <div class="earning-label">Tasks</div>
                    <div class="earning-value" id="tasks-count">0</div>
                </div>
            </div>
            <button class="btn-go" onclick="launchSurvey()">LAUNCH TASK 🚀</button>
            <button class="btn-secondary" onclick="checkUserStats()">View History</button>
            <div id="history-panel" style="display:none; margin-top:15px; font-size:0.75rem; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px;">
                <p id="history-text">Loading...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

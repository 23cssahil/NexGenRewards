<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Rewards | Survey Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .logo-icon { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        h1 { font-size: 1.6rem; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 12px; color: white; }

        .btn-primary { width: 100%; background: var(--primary); color: white; border: none; border-radius: 10px; padding: 14px; font-weight: 700; cursor: pointer; }

        .dashboard { display: none; }
        .earnings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .earning-card { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; text-align: center; }
        .btn-go { width: 100%; background: #f43f5e; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        
        #loading-overlay { position: fixed; inset: 0; background: var(--bg-dark); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <!-- 🔐 LOGIN -->
        <div id="login-view" class="card">
            <div class="header">
                <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
                <h1>NexGen Rewards</h1>
            </div>
            <div class="input-group">
                <label>Worker ID</label>
                <input type="text" id="workerId" placeholder="NEX01">
            </div>
            <button class="btn-primary" onclick="login()">Access Portal</button>
        </div>

        <!-- 🚀 DASHBOARD -->
        <div id="dashboard-view" class="card dashboard">
            <div class="header">
                <h2 id="display-id">NEX01</h2>
            </div>
            <div class="earnings-grid">
                <div class="earning-card">
                    <div style="font-size:0.7rem; color:var(--text-dim)">Balance</div>
                    <div id="pending-amt" style="font-weight:700">$0.00</div>
                </div>
                <div class="earning-card">
                    <div style="font-size:0.7rem; color:var(--text-dim)">Tasks</div>
                    <div id="tasks-count" style="font-weight:700">0</div>
                </div>
            </div>
            <button class="btn-go" onclick="launchSurvey()">LAUNCH TASK 🚀</button>
            <button style="width:100%; background:rgba(255,255,255,0.1); border:none; padding:10px; border-radius:8px; color:white; cursor:pointer;" onclick="checkUserStats()">Refresh Stats</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
